<script>
    const quotes = [["hahaa", "Louis", "2026"],
    ["I AM DOOM", "DR. DOOM", "DOOMSDAY"],
    ["God does not play dice with the universe", "Albert Einstein", "as most frequently quoted"],
    ["The universe is so vast and ageless that the life of one man can only be measured by the size of his sacrifice", "RAF pilot", "killed during the Battle of Dunkirk"],
    ["Let your plans be dark and impenetrable as night, and when you move, fall like a thunderbolt", "Sun Tzu", "The Art of War"],
    ["Things always seem fairer when we look back at them, and it is out of that inaccessible tower of the past that Longing leans and beckons.", "James Russel Lowell", "Literary Essays, vol. I"],
    ["The energy of the universe is constant; the entropy of the Universe tends to a maximum.", "Rudolf Clausius", "Statements of the First and Second Law of Thermodynamics"],
    ["If it's a sin to 'play God', then why would He leave His tools lying around?", "Unknown", "Unknown"],
    ["And when the hourglass has run out, the hourglass of temporality, when the noise of secular life has grown silent and its restless or ineffectual activism has come to an end, when everything around you is still, as it is in eternity, then eternity asks you and every individual in these millions and millions about only one thing: whether you have lived in despair or not.", "Søren Kierkegaard", "The Sickness unto Death"],
    ["The eyes are the mirror of the soul.", "Proverb", "Yiddish"],
    ["To exist everywhere is to exist nowhere. To know everything is to know nothing. To be omnipotent is to be impotent. The essence of divinity is contradiction.", "Unknown", "Unknown"],
    ["But the real Self is as hard to arrive at as the real table, and does not seem to have that absolute, convincing certainty that belongs to particular experiences.", "Bertrand Russell", "The Problems of Philosophy"],
    ["There are moments when woman's hands possess superhuman strength.", "Victor Hugo", "Notre‐Dame de Paris"],
    ["It is a singular fact of the physical sciences, which we ignore for sanity's sake, that time has no real meaning. A mathematical arrow, pointing from cause to effect, in the direction of predictability—that's all it is. If you take the equations literally, our fates are already written, unto the end of time, unless you take a multiversal view of things. What then, is this moment? What does it mean to inhabit a single slice of time? Is that, after all, what a soul is? And if so—can a soul change fate?", "...", "..."],
    ["In preparing for battle I have always found that plans are useless, but planning is indispensable.", "Dwight D. Eisenhower", "as attributed by Richard Nixon in Six Crises"],
    ["In wartime, truth is so precious that she should always be attended by a bodyguard of lies.", "Winston Churchill", "to Joseph Stalin"],
    ["Man is the only creature who refuses to be what he is.", "Albert Camus", "The Rebel"],
    ["One way to look at the Second Law is that only systems in a stable steady‐state endure, and thus in the long run that all systems must tend towards stability. When put that way, it seems obvious, tautological even, and yet it has very important consequences. After all, neither life nor sentience is stable, only meta‐stable, and thus in the long run neither life nor sentience is possible.", "...", "..."]
    ];
    let cur = 0;

    const quote = document.getElementById("quote");
    quote.addEventListener('click', () => {
        const content = document.getElementById("quoteContents");
        const metadata = document.getElementById("quoteMetadata");
        content.style.opacity = 0;
        metadata.style.opacity = 0;

        setTimeout(() => {
            cur = (cur + 1) % quotes.length;

            content.textContent = `"${quotes[cur][0]}"`;
            metadata.textContent = `—${quotes[cur][1]} (${quotes[cur][2]})`;

            content.style.opacity = 1;
            metadata.style.opacity = 1;

        }, 400);
    });
</script>
