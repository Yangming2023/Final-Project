<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>More about</title>
    <a href="https://final-project-5h8w.onrender.com/Gallary.html">←back to gallary</a>
    <style>
        #show {
            text-align: center;
        }
        #whereFind {
            display: block;
        }
        .gallaryImage div {
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div id="show">
        <h1 id="title"></h1>
        <a id="whereFind" class="gallaryImage">
            <div>
                <img id="displayImage">
            </div>
        </a>
        <p id="description"></p>
    </div>
    <script src="script.js"></script>
</body>
<script>
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const thing = urlParams.get("img");

    const descriptions = {"Lemon": ["images/lemon.jfif", "bob", "hah", "https://www.youtube.com/watch?v=3NNhrqHZqlI"]};

    const header = document.getElementById("title");
    header.textContent = descriptions[thing][1];
    const display = document.getElementById("displayImage");
    display.src = descriptions[thing][0];
    display.alt = descriptions[thing][1];
    const link = document.getElementById("whereFind");
    link.href = descriptions[thing][3];
    const description = document.getElementById("description");
    description.textContent = descriptions[thing][2];
</script>
</html>
