<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>More about</title>
    <a href="http://127.0.0.1:5500/public/Gallary.html">←back to gallary</a>
</head>
<body>
    <h1 id="title"></h1>
    <img id="displayImage">
    <p id="description"></p>
</body>
<script>
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const thing = urlParams.get("img");

    const descriptions = {"Lemon": ["images/lemon.jfif", "bob", "hah"]};

    const header = document.getElementById("title");
    header.textContent = descriptions[thing][1];
    const display = document.getElementById("displayImage");
    display.src = descriptions[thing][0];
    const description = document.getElementById("description");
    description.textContent = descriptions[thing][2];
</script>
</html>
